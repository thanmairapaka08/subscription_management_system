<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SubTrackr</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a th:href="@{/}" class="nav-brand" style="display: block; margin-bottom: 1.5rem;">SubTrackr</a>
            <h1>Create Account</h1>
            <p>Start tracking your subscriptions today</p>
            
            <div class="alert alert-error glass" th:if="${errorMessage}" th:text="${errorMessage}" style="margin-bottom: 1rem; color: #EF4444;"></div>
            
            <form id="signupForm" th:action="@{/auth}" method="POST">
                <input type="hidden" name="action" value="register">
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            
            <div class="auth-links">
                Already have an account? <a th:href="@{/login}">Log In</a>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
