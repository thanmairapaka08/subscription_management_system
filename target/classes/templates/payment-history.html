<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SubTrackr - Payment History</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar scrolled" th:if="${session.sessionUser != null}">
        <div class="container">
            <div style="display: flex; align-items: center; gap: 2rem;">
                <a th:href="@{/}" class="nav-brand">SubTrackr</a>
                <ul class="nav-links" style="margin-bottom: 0;">
                    <li><a th:href="@{/dashboard}">Dashboard</a></li>
                    <li>
                        <a th:href="${session.sessionUser.plan == 'premium'} ? @{/premium-analytics} : @{/analytics}">Analytics</a>
                    </li>
                    <li><a th:href="@{/profile}">Profile</a></li>
                    <li th:if="${session.sessionUser.plan == 'basic'}">
                        <a th:href="@{/upgrade}" style="color: #ffd700;">Upgrade to Premium</a>
                    </li>
                </ul>
            </div>
            <div class="nav-actions">
                <span style="color: var(--text-muted); margin-right: 1rem;">Hello, <span th:text="${session.sessionUser.fullName}">User</span></span>
                <form th:action="@{/auth}" method="POST" style="display:inline;">
                    <input type="hidden" name="action" value="logout">
                    <button type="submit" class="btn btn-ghost" style="padding: 0.5rem 1rem;">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container" th:if="${session.sessionUser != null}">
        <div class="page-header header-actions">
            <div>
                <h1 style="margin: 0;">Payment History</h1>
                <div class="greeting">Review your past transactions</div>
            </div>
            <div>
                <a th:if="${session.sessionUser.plan != 'premium'}" th:href="@{/upgrade}" class="btn">Upgrade to Premium</a>
            </div>
        </div>

        <div class="alert alert-success glass" th:if="${successMessage}" th:text="${successMessage}" style="margin-bottom: 1rem; color: #10B981;"></div>

        <div class="glass" style="padding: 24px; margin-bottom: 40px;">
            <div class="table-container">
                <table style="background: transparent;">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Order ID</th>
                            <th>Payment ID</th>
                            <th>Plan</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${payments == null or payments.isEmpty()}">
                            <td colspan="6" style="text-align: center; color: var(--text-muted);">No payment history found.</td>
                        </tr>
                        <tr th:each="payment : ${payments}">
                            <td th:text="${payment.createdAt != null ? #dates.format(payment.createdAt, 'yyyy-MM-dd HH:mm') : 'N/A'}">Date</td>
                            <td style="font-family: monospace;" th:text="${payment.orderId}">Order ID</td>
                            <td style="font-family: monospace;" th:text="${payment.paymentId}">Payment ID</td>
                            <td style="text-transform: capitalize;" th:text="${payment.plan}">Plan</td>
                            <td th:text="'₹' + ${#numbers.formatDecimal(payment.amount, 1, 2)}">₹0.00</td>
                            <td th:class="${payment.status == 'Success' or payment.status == 'paid' ? 'status-active' : ''}" th:text="${payment.status}">Status</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
