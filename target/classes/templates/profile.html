<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SubTrackr - Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .profile-card { max-width: 500px; margin: 40px auto; text-align: center; padding: 40px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; background-color: var(--primary); color: #000; font-size: 3rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-weight: bold; }
        .user-name { font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; }
        .user-email { color: var(--text-muted); margin-bottom: 30px; }
        .info-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <nav class="navbar scrolled" th:if="${session.sessionUser != null}">
        <div class="container">
            <div style="display: flex; align-items: center; gap: 2rem;">
                <a th:href="@{/}" class="nav-brand">SubTrackr</a>
                <ul class="nav-links" style="margin-bottom: 0;">
                    <li><a th:href="@{/dashboard}">Dashboard</a></li>
                    <li>
                        <a th:href="${session.sessionUser.plan == 'premium'} ? @{/premium-analytics} : @{/analytics}">Analytics</a>
                    </li>
                    <li><a th:href="@{/profile}" style="color: var(--text-white);">Profile</a></li>
                    <li th:if="${session.sessionUser.plan == 'basic'}">
                        <a th:href="@{/upgrade}" style="color: #ffd700;">Upgrade to Premium</a>
                    </li>
                </ul>
            </div>
            <div class="nav-actions">
                <span style="color: var(--text-muted); margin-right: 1rem;">Hello, <span th:text="${session.sessionUser.fullName}">User</span></span>
                <form th:action="@{/auth}" method="POST" style="display:inline;">
                    <input type="hidden" name="action" value="logout">
                    <button type="submit" class="btn btn-ghost" style="padding: 0.5rem 1rem;">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="profile-card glass" th:if="${session.sessionUser != null}">
        <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(session.sessionUser.fullName, 0, 1))}">U</div>
        <div class="user-name">
            <span th:text="${session.sessionUser.fullName}">John Doe</span>
            <span class="premium-badge" title="Premium Standard" th:if="${session.sessionUser.plan == 'premium'}">👑</span>
        </div>
        <div class="user-email" th:text="${session.sessionUser.email}">you@example.com</div>

        <div style="text-align: left; margin-top: 30px;">
            <div class="info-row">
                <span style="color: var(--text-muted);">Total Subscriptions</span>
                <span style="font-weight: bold;" th:text="${subCount}">0</span>
            </div>
            <div class="info-row">
                <span style="color: var(--text-muted);">Plan Type</span>
                <span style="font-weight: bold; text-transform: capitalize;" th:text="${session.sessionUser.plan}">Basic</span>
            </div>
            <div class="info-row">
                <span style="color: var(--text-muted);">Member Since</span>
                <span style="font-weight: bold;" th:text="${session.sessionUser.createdAt != null ? #dates.format(session.sessionUser.createdAt, 'yyyy-MM-dd') : 'N/A'}">2026-01-01</span>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <a th:href="@{/settings}" class="btn">Edit Settings</a>
        </div>
    </div>
</body>
</html>
