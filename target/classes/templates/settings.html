<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SubTrackr - Settings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .btn-downgrade {
            padding: 0.5rem 1rem; 
            color: #F8FAFC; 
            margin-right: 0.5rem;
            transition: all 0.2s ease;
        }
        .btn-downgrade:hover {
            color: #EF4444;
            border-color: #EF4444;
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled" th:if="${session.sessionUser != null}">
        <div class="container">
            <div style="display: flex; align-items: center; gap: 2rem;">
                <a th:href="@{/}" class="nav-brand">SubTrackr</a>
                <ul class="nav-links" style="margin-bottom: 0;">
                    <li><a th:href="@{/dashboard}">Dashboard</a></li>
                    <li>
                        <a th:href="${session.sessionUser.plan == 'premium'} ? @{/premium-analytics} : @{/analytics}">Analytics</a>
                    </li>
                    <li><a th:href="@{/profile}">Profile</a></li>
                    <li th:if="${session.sessionUser.plan == 'basic'}">
                        <a th:href="@{/upgrade}" style="color: #ffd700;">Upgrade to Premium</a>
                    </li>
                </ul>
            </div>
            <div class="nav-actions">
                <span style="color: var(--text-muted); margin-right: 1rem;">Hello, <span th:text="${session.sessionUser.fullName}">User</span></span>
                <form th:action="@{/auth}" method="POST" style="display:inline;">
                    <input type="hidden" name="action" value="logout">
                    <button type="submit" class="btn btn-ghost" style="padding: 0.5rem 1rem;">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;" th:if="${session.sessionUser != null}">
        <h1 style="margin-top: 40px; margin-bottom: 30px;">Settings</h1>

        <div class="alert alert-success glass" th:if="${successMessage}" th:text="${successMessage}" style="margin-bottom: 1rem; color: #10B981;"></div>
        <div class="alert alert-error glass" th:if="${errorMessage}" th:text="${errorMessage}" style="margin-bottom: 1rem; color: #EF4444;"></div>

        <div class="glass" style="padding: 30px; margin-bottom: 20px;">
            <h3 style="margin-top:0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Update Profile</h3>
            <form th:action="@{/settings}" method="post">
                <input type="hidden" name="action" value="updateProfile">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control" th:value="${session.sessionUser.fullName}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" th:value="${session.sessionUser.email}" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: auto;">Save Changes</button>
            </form>
        </div>

        <div class="glass" style="padding: 30px; margin-bottom: 20px;">
            <h3 style="margin-top:0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Change Password</h3>
            <form th:action="@{/settings}" method="post">
                <input type="hidden" name="action" value="updatePassword">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" name="currentPassword" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="newPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: auto;">Update Password</button>
            </form>
        </div>

        <div class="glass" style="padding: 30px; margin-bottom: 40px;">
            <h3 style="margin-top:0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Preferences</h3>
            <form th:action="@{/settings}" method="post" style="display: flex; justify-content: space-between; align-items: center;">
                <input type="hidden" name="action" value="toggleReminders">
                <div>
                    <label style="font-size: 1.1rem; font-weight: 500;">Email Reminders</label>
                    <div style="font-size: 0.9rem; color: var(--text-muted); margin-top: 5px;">Get notified 3 days before renewal.</div>
                </div>
                <button type="submit" class="btn" style="width: auto; background-color: transparent; border: 1px solid var(--primary); color: var(--primary);">Save Preference</button>
            </form>
        </div>
    </div>
</body>
</html>
