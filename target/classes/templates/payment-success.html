<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success - SubTrackr</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/premium.css}">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; position: relative;">
    
    <!-- Confetti Elements -->
    <div class="confetti" style="left: 10%; animation: fall 3s infinite; background-color: #6366F1;"></div>
    <div class="confetti" style="left: 20%; animation: fall 4s infinite 0.5s; background-color: #10B981;"></div>
    <div class="confetti" style="left: 30%; animation: fall 2.5s infinite 1s; background-color: #F59E0B;"></div>
    <div class="confetti" style="left: 40%; animation: fall 3.5s infinite 0.2s; background-color: #F43F5E;"></div>
    <div class="confetti" style="left: 50%; animation: fall 3s infinite 1.5s; background-color: #06B6D4;"></div>
    <div class="confetti" style="left: 60%; animation: fall 4.5s infinite 0.7s; background-color: #8B5CF6;"></div>
    <div class="confetti" style="left: 70%; animation: fall 2.8s infinite 0.3s; background-color: #10B981;"></div>
    <div class="confetti" style="left: 80%; animation: fall 3.2s infinite 1.1s; background-color: #6366F1;"></div>
    <div class="confetti" style="left: 90%; animation: fall 4s infinite 0.8s; background-color: #F59E0B;"></div>

    <div class="auth-card" style="text-align: center; max-width: 500px; z-index: 10;">
        <div style="font-size: 5rem; color: #10B981; margin-bottom: 1rem; line-height: 1;">✓</div>
        <h2 style="margin-bottom: 1rem;">Welcome to SubTrackr Premium! 🎉</h2>
        <p style="color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.6;">Your payment was successful. You now have access to unlimited subscriptions, advanced analytics, and smart recommendations.</p>
        
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <a th:href="@{/premium-analytics}" class="btn btn-primary" style="display: block; margin-bottom: 1rem;">View Premium Analytics</a>
            <a th:href="@{/dashboard}" class="btn btn-ghost" style="display: block;">Go to Dashboard</a>
        </div>
    </div>
</body>
</html>
