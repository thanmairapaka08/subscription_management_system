<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed - SubTrackr</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; position: relative;">
    <div class="auth-card" style="text-align: center; max-width: 500px; z-index: 10; border-color: #EF4444;">
        <div style="font-size: 5rem; color: #EF4444; margin-bottom: 1rem; line-height: 1;">✗</div>
        <h2 style="margin-bottom: 1rem; color: #F8FAFC;">Payment Failed</h2>
        <p style="color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.6;">We could not process your transaction. Please try again. If the issue persists, contact your bank or SubTrackr support.</p>
        
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <a th:href="@{/upgrade}" class="btn btn-primary" style="display: block; margin-bottom: 1rem; background-color: #EF4444; border-color: #EF4444;">Try Again</a>
            <a th:href="@{/dashboard}" class="btn btn-ghost" style="display: block;">Go to Dashboard</a>
        </div>
    </div>
</body>
</html>
