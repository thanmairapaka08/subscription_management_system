<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SubTrackr - Notifications</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar scrolled" th:if="${session.sessionUser != null}">
        <div class="container">
            <div style="display: flex; align-items: center; gap: 2rem;">
                <a th:href="@{/}" class="nav-brand">SubTrackr</a>
                <ul class="nav-links" style="margin-bottom: 0;">
                    <li><a th:href="@{/dashboard}">Dashboard</a></li>
                    <li>
                        <a th:href="${session.sessionUser.plan == 'premium'} ? @{/premium-analytics} : @{/analytics}">Analytics</a>
                    </li>
                    <li><a th:href="@{/profile}">Profile</a></li>
                    <li th:if="${session.sessionUser.plan == 'basic'}">
                        <a th:href="@{/upgrade}" style="color: #ffd700;">Upgrade to Premium</a>
                    </li>
                </ul>
            </div>
            <div class="nav-actions">
                <span style="color: var(--text-muted); margin-right: 1rem;">Hello, <span th:text="${session.sessionUser.fullName}">User</span></span>
                <form th:action="@{/auth}" method="POST" style="display:inline;">
                    <input type="hidden" name="action" value="logout">
                    <button type="submit" class="btn btn-ghost" style="padding: 0.5rem 1rem;">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;" th:if="${session.sessionUser != null}">
        <h1 style="margin-top: 40px; margin-bottom: 30px;">Notifications</h1>

        <div class="glass" style="padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--secondary);">
            <div style="font-weight: bold; margin-bottom: 5px;">Upcoming Renewal</div>
            <div style="color: var(--text-muted);">Netflix is renewing in 3 days.</div>
        </div>

        <div class="glass" style="padding: 20px; margin-bottom: 15px; border-left: 5px solid #ffd700;">
            <div style="font-weight: bold; margin-bottom: 5px;">Payment Successful</div>
            <div style="color: var(--text-muted);">Spotify payment of $9.99 was successful.</div>
        </div>

        <div class="glass" style="padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--primary);">
            <div style="font-weight: bold; margin-bottom: 5px;">System Alert</div>
            <div style="color: var(--text-muted);">New predictive analytics features are now available for premium users!</div>
        </div>
    </div>
</body>
</html>
