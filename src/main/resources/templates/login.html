<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - SubTrackr</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a th:href="@{/}" class="nav-brand" style="display: block; margin-bottom: 2rem;">SubTrackr</a>
            <h1>Welcome Back</h1>
            <p>Log in to manage your subscriptions</p>
            
            <div class="alert alert-error glass" th:if="${errorMessage}" th:text="${errorMessage}" style="margin-bottom: 1rem; color: #EF4444;"></div>
            <div class="alert alert-success glass" th:if="${successMessage}" th:text="${successMessage}" style="margin-bottom: 1rem; color: #10B981;"></div>
            
            <form th:action="@{/auth}" method="POST">
                <input type="hidden" name="action" value="login"> 
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Log In</button>
            </form>
            
            <div class="auth-links">
                Don't have an account? <a th:href="@{/signup}">Sign Up</a>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
