<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SubTrackr - Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-header { margin-top: 40px; margin-bottom: 30px; }
        .page-header h1 { color: var(--text-main); margin: 0; }
        .stat-card .value { font-size: 2.2rem; }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-active-badge {
            background-color: rgba(16, 185, 129, 0.2);
            color: #10B981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status-suspended-badge {
            background-color: rgba(239, 68, 68, 0.2);
            color: #EF4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <div class="container">
            <div style="display: flex; align-items: center; gap: 2rem;">
                <a th:href="@{/}" class="nav-brand">SubTrackr <span style="font-size: 1rem; color: #fff; background: #ef4444; padding: 2px 8px; border-radius: 4px; margin-left: 10px;">ADMIN</span></a>
                <ul class="nav-links" style="margin-bottom: 0;">
                    <li><a th:href="@{/dashboard}" style="color: var(--text-white);">User View</a></li>
                </ul>
            </div>
            <div class="nav-actions">
                <form th:action="@{/auth}" method="POST" style="display:inline;">
                    <input type="hidden" name="action" value="logout">
                    <button type="submit" class="btn btn-ghost" style="padding: 0.5rem 1rem; color: #ef4444;">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header header-actions">
            <div>
                <h1>Admin Control Panel</h1>
                <div class="greeting">System Overview</div>
            </div>
        </div>

        <!-- Feedback Alerts -->
        <div class="alert alert-success glass" th:if="${param.success}" th:text="'User deleted successfully!'" style="margin-bottom: 1.5rem; color: #10B981; padding: 12px 20px;"></div>
        <div class="alert alert-error glass" th:if="${param.error == 'self_delete'}" th:text="'Error: You cannot delete your own administrator account!'" style="margin-bottom: 1.5rem; color: #EF4444; padding: 12px 20px;"></div>

        <div class="stats-grid">
            <div class="stat-card glass">
                <h3>Total Users</h3>
                <div class="value" th:text="${totalUsers}">0</div>
            </div>
            <div class="stat-card glass">
                <h3>Premium Users</h3>
                <div class="value" style="color: #ffd700;" th:text="${premiumUsers}">0</div>
            </div>
            <div class="stat-card glass">
                <h3>Basic Users</h3>
                <div class="value" th:text="${basicUsers}">0</div>
            </div>
            <div class="stat-card glass">
                <h3>Total Revenue</h3>
                <div class="value" style="color: var(--secondary);" th:text="'₹' + ${#numbers.formatDecimal(totalRevenue, 1, 2)}">₹0.00</div>
            </div>
        </div>

        <div class="glass" style="padding: 24px; margin-bottom: 40px;">
            <h3 style="margin-top: 0; margin-bottom: 20px;">All Users</h3>
            <div class="table-container">
                <table style="background: transparent;">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Plan</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Joined</th>
                            <th style="text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td style="font-weight: 500; vertical-align: middle;">
                                <span th:text="${u.fullName}">User Full Name</span>
                                <span class="premium-badge" th:if="${u.plan == 'premium'}">👑</span>
                            </td>
                            <td th:text="${u.email}" style="vertical-align: middle;">user@example.com</td>
                            <td style="text-transform: capitalize; vertical-align: middle;" th:text="${u.plan}">basic</td>
                            <td style="text-transform: capitalize; vertical-align: middle;" th:text="${u.role}">user</td>
                            <td style="vertical-align: middle;">
                                <span th:text="${u.status}" 
                                      th:classappend="${#strings.toLowerCase(u.status) == 'active' ? 'status-badge status-active-badge' : 'status-badge status-suspended-badge'}">
                                    active
                                </span>
                            </td>
                            <td th:text="${u.createdAt != null ? #dates.format(u.createdAt, 'yyyy-MM-dd') : 'N/A'}" style="vertical-align: middle;">2026-01-01</td>
                            <td style="display: flex; gap: 0.5rem; justify-content: center; align-items: center; border-bottom: none;">
                                <!-- Toggle Plan -->
                                <form th:action="@{/admin/user/plan}" method="POST" style="display: inline;">
                                    <input type="hidden" name="userId" th:value="${u.id}">
                                    <button type="submit" class="btn btn-ghost" style="padding: 6px 12px; font-size: 0.8rem;" 
                                            th:text="${#strings.toLowerCase(u.plan) == 'premium' ? 'Make Basic' : 'Make Premium'}">Plan</button>
                                </form>
                                <!-- Toggle Status -->
                                <form th:action="@{/admin/user/status}" method="POST" style="display: inline;">
                                    <input type="hidden" name="userId" th:value="${u.id}">
                                    <button type="submit" class="btn btn-ghost" 
                                            th:style="${#strings.toLowerCase(u.status) == 'active' ? 'padding: 6px 12px; font-size: 0.8rem; color: #EF4444; border-color: rgba(239, 68, 68, 0.4);' : 'padding: 6px 12px; font-size: 0.8rem; color: #10B981; border-color: rgba(16, 185, 129, 0.4);'}"
                                            th:text="${#strings.toLowerCase(u.status) == 'active' ? 'Suspend' : 'Activate'}">Status</button>
                                </form>
                                <!-- Delete User -->
                                <form th:action="@{/admin/user/delete}" method="POST" style="display: inline;" 
                                      th:if="${u.id != session.sessionUser.id}"
                                      onsubmit="return confirm('Are you sure you want to delete this user and all their subscriptions/payments permanently?');">
                                    <input type="hidden" name="userId" th:value="${u.id}">
                                    <button type="submit" class="btn btn-ghost" style="padding: 6px 12px; font-size: 0.8rem; color: #EF4444; border-color: rgba(239, 68, 68, 0.4);">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
